<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 256" role="img" aria-labelledby="title desc">
  <title id="title">TekNiLabs logo</title>
  <desc id="desc">A stylized TL monogram followed by the word TekNiLabs with Labs in blue.</desc>
  <defs>
    <linearGradient id="darkMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#262c35"/>
      <stop offset="0.48" stop-color="#151a22"/>
      <stop offset="1" stop-color="#05070b"/>
    </linearGradient>
    <linearGradient id="blueAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1682ff"/>
      <stop offset="1" stop-color="#23a8ff"/>
    </linearGradient>
    <filter id="cutShadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g fill="none" fill-rule="evenodd">
    <g filter="url(#cutShadow)">
      <path fill="url(#darkMetal)" d="M78 74h178l-24 24h-76v90l-24 28V98H78z"/>
      <path fill="url(#darkMetal)" d="M175 116h24v54h88v24H175z"/>
      <path fill="#0b0f16" opacity="0.9" d="M132 98h24v90l-24 28z"/>
      <path fill="#1f2630" d="M78 74h178l-9 9H78z" opacity="0.72"/>
    </g>

    <text x="334" y="165" font-family="Orbitron, Eurostile, 'Arial Narrow', Arial, sans-serif" font-weight="700" font-size="76" letter-spacing="7">
      <tspan fill="url(#darkMetal)">TEKNI</tspan><tspan fill="url(#blueAccent)" dx="-2">LABS</tspan>
    </text>
  </g>
</svg>
